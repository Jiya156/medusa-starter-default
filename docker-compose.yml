version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa_user
      POSTGRES_PASSWORD: medusa_password
      POSTGRES_DB: medusa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data: /var/lib/postgresql/data
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa_user -d medusa_db"]
      interval: 10s
      timeout: 5s
      retires: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgres://medusa_user:medusa_password@postgres:5432/medusa_db
      JWT_SECRET: some_jwt_secret_123
      COOKIE_SECRET: some_cookie_secret_456
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:9000
      AUTH_CORS: http://localhost:8000, http://localhost:9000
      MEDUSA_WORKER_MODE: shared
      MEDUSA_BACKEND_URL: http://localhost:9000
      NODE_ENV: development
      PORT: 9000
    networks:
      - medusa_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medusa_frontend
    restart: unless-stopped
    depends_on:
    - backend
    ports:
     - "8000:8000"
    environment:
      MDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_6ba8ea174af9a5002f6fbcc3db12a2d11fcf58e5155e4c2bae8dc9748df4a04f
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
    networks:
      - medusa_network

volumes:
  postgres_data:

networks:
  medusa_network:
    driver: bridge